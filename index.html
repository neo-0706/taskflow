<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JavaScript SandBox</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <main class="main-container">
        <svg class="svg-container">
            <defs>
                <filter id="turbulent-displace" colorInterpolationFilters="sRGB" x="-20%" y="-20%" width="140%"
                    height="140%">
                    <feTurbulence type="turbulence" baseFrequency="0.02" numOctaves="10" result="noise1" seed="1" />
                    <feOffset in="noise1" dx="0" dy="0" result="offsetNoise1">
                        <animate attributeName="dy" values="700; 0" dur="6s" repeatCount="indefinite"
                            calcMode="linear" />
                    </feOffset>

                    <feTurbulence type="turbulence" baseFrequency="0.02" numOctaves="10" result="noise2" seed="1" />
                    <feOffset in="noise2" dx="0" dy="0" result="offsetNoise2">
                        <animate attributeName="dy" values="0; -700" dur="6s" repeatCount="indefinite"
                            calcMode="linear" />
                    </feOffset>

                    <feTurbulence type="turbulence" baseFrequency="0.02" numOctaves="10" result="noise1" seed="2" />
                    <feOffset in="noise1" dx="0" dy="0" result="offsetNoise3">
                        <animate attributeName="dx" values="490; 0" dur="6s" repeatCount="indefinite"
                            calcMode="linear" />
                    </feOffset>

                    <feTurbulence type="turbulence" baseFrequency="0.02" numOctaves="10" result="noise2" seed="2" />
                    <feOffset in="noise2" dx="0" dy="0" result="offsetNoise4">
                        <animate attributeName="dx" values="0; -490" dur="6s" repeatCount="indefinite"
                            calcMode="linear" />
                    </feOffset>

                    <feComposite in="offsetNoise1" in2="offsetNoise2" result="part1" />
                    <feComposite in="offsetNoise3" in2="offsetNoise4" result="part2" />
                    <feBlend in="part1" in2="part2" mode="color-dodge" result="combinedNoise" />

                    <feDisplacementMap in="SourceGraphic" in2="combinedNoise" scale="30" xChannelSelector="R"
                        yChannelSelector="B" />
                </filter>
            </defs>
        </svg>

        <div class="card-container">
            <div class="inner-container">
                <div class="border-outer">
                    <div class="main-card"></div>
                </div>
                <div class="glow-layer-1"></div>
                <div class="glow-layer-2"></div>
            </div>

            <div class="overlay-1"></div>
            <div class="overlay-2"></div>
            <div class="background-glow"></div>

            <div class="content-container">
                <div class="content-top">
                    <div style="display: flex; justify-content: center;">
                        <div class="button-85"
                            style="font-size: 16px; width: 70%;">
                            My todo list
                        </div>
                    </div>
                    <p class="title">Enter your tasks:</p>

                    <input class="c-checkbox" type="checkbox" id="checkbox">
                    <div class="c-formContainer">
                        <form class="c-form" action="">
                            <input class="c-form__input" placeholder="Task" type="text" autocomplete="off"
                                maxlength="80" required>
                            <label class="c-form__buttonLabel" for="checkbox">
                                <button class="c-form__button" type="button">add</button>
                            </label>
                            <label class="c-form__toggle" for="checkbox" data-title="New Task"></label>
                        </form>
                    </div>
                </div>

                <hr class="divider" />

                <!-- لیست تسک‌ها — ul معتبر برای li‌ها -->
                <ul class="content-bottom" role="list">
                    <li class="scrollbar-glass">
                        <div class="task-box">
                            <button class="check-btn" aria-label="complete task"></button>
                            <span class="task-text">Learn JavaScript</span>
                        </div>
                        <button class="delete-btn" aria-label="delete task">🗑️</button>
                    </li>
                    <li class="scrollbar-glass">
                        <div class="task-box">
                            <button class="check-btn" aria-label="complete task"></button>
                            <span class="task-text">Learn Python</span>
                        </div>
                        <button class="delete-btn" aria-label="delete task">🗑️</button>
                    </li>
                    <li class="scrollbar-glass">
                        <div class="task-box">
                            <button class="check-btn" aria-label="complete task"></button>
                            <span class="task-text">Learn C++</span>
                        </div>
                        <button class="delete-btn" aria-label="delete task">🗑️</button>
                    </li>
                    <li class="scrollbar-glass">
                        <div class="task-box">
                            <button class="check-btn" aria-label="complete task"></button>
                            <span class="task-text">Learn Django</span>
                        </div>
                        <button class="delete-btn" aria-label="delete task">🗑️</button>
                    </li>
                    <li class="scrollbar-glass">
                        <div class="task-box">
                            <button class="check-btn" aria-label="complete task"></button>
                            <span class="task-text">Learn FastAPI</span>
                        </div>
                        <button class="delete-btn" aria-label="delete task">🗑️</button>
                    </li>
                    <li class="scrollbar-glass">
                        <div class="task-box">
                            <button class="check-btn" aria-label="complete task"></button>
                            <span class="task-text">Learn DB</span>
                        </div>
                        <button class="delete-btn" aria-label="delete task">🗑️</button>
                    </li>
                    <li class="scrollbar-glass">
                        <div class="task-box">
                            <button class="check-btn" aria-label="complete task"></button>
                            <span class="task-text">Learn Rust</span>
                        </div>
                        <button class="delete-btn" aria-label="delete task">🗑️</button>
                    </li>
                </ul>
                <div class="clear-btn">
                    <button class="button-86">Clear Tasks</button>
                </div>
            </div>
        </div>
    </main>

    <script src="./app.js"></script>

</body>

</html>
